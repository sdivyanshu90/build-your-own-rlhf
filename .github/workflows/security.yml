name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # weekly Monday scan

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit
      - name: Bandit (fail on medium+)
        run: bandit -r src/ -ll

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pip-audit && pip install -e .
      - name: pip-audit (fail on any known CVE)
        run: pip-audit

  trivy-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t rlhf-ppo:latest -f infra/Dockerfile .
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rlhf-ppo:latest
          exit-code: "1"
          severity: HIGH,CRITICAL
