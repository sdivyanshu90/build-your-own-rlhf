name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # weekly Monday scan

env:
  PIP_CONSTRAINT: ${{ github.workspace }}/requirements.lock

jobs:
  # Static analysis of OUR code — a hard gate (deterministic, fully in our control).
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit
      - name: Bandit (fail on medium+)
        run: bandit -r src/ -ll

  # Dependency CVE audit — advisory. Transitive CVEs in pinned ML deps are tracked
  # and triaged out-of-band; they must not block all development. The report is
  # always produced for review.
  pip-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pip-audit && pip install -e .
      - name: pip-audit (advisory)
        run: pip-audit --desc || true

  # Container image scan — advisory. Base-image (CUDA) CVEs are upstream and often
  # unfixed; ignore-unfixed + exit-code 0 keeps the scan informational.
  trivy-image:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t rlhf-ppo:latest -f infra/Dockerfile .
      - name: Trivy scan (advisory)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rlhf-ppo:latest
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: "0"
